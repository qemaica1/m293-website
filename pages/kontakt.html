<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Kontakt – Lian Walser, Informatiker EFZ GBS St. Gallen." />
  <title>Lian Walser – Kontakt</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <a href="../index.html" class="nav-logo">LW<span>·</span></a>
      <button class="nav-toggle" aria-label="Menü öffnen" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links">
        <li><a href="../index.html">Über mich</a></li>
        <li><a href="faehigkeiten.html">Fähigkeiten</a></li>
        <li><a href="portfolio.html">Portfolio</a></li>
        <li><a href="kontakt.html" class="active">Kontakt</a></li>
      </ul>
    </div>
  </nav>

  <!-- Kontakt -->
  <section class="section">
    <div class="container">
      <h1 class="section-title">Kontakt</h1>
      <p class="section-subtitle">Ich freue mich über deine Nachricht!</p>

      <div class="contact-layout">

        <!-- Kontaktinfos -->
        <div class="contact-info">
          <h3>Kontaktinfos</h3>

          <div class="contact-item">
            <span class="contact-dot contact-dot--blue"></span>
            <span>lianwalser6@gmail.com</span>
          </div>
          <div class="contact-item">
            <span class="contact-dot contact-dot--linkedin"></span>
            <span>linkedin.com/in/hans-ruedi-8a636737b</span>
          </div>
          <div class="contact-item">
            <span class="contact-dot contact-dot--dark"></span>
            <span>github.com/qemaica1</span>
          </div>
          <div class="contact-item">
            <span class="contact-dot contact-dot--green"></span>
            <span>+41 78 215 65 63</span>
          </div>

          <div class="social-row">
            <a href="https://github.com/qemaica1" class="social-btn social-btn--github" target="_blank" rel="noopener noreferrer">GitHub</a>
            <a href="https://www.linkedin.com/in/hans-ruedi-8a636737b/" class="social-btn social-btn--linkedin" target="_blank" rel="noopener noreferrer">LinkedIn</a>
            <a href="https://www.instagram.com/lw0905_sg" class="social-btn social-btn--instagram" target="_blank" rel="noopener noreferrer">Instagram</a>
          </div>
        </div>

        <!-- Kontaktformular -->
        <div class="contact-form">
          <h3>Schreib mir</h3>

          <form action="#" method="post" novalidate>
            <div class="form-row">
              <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Dein vollständiger Name" required />
              </div>
              <div class="form-group">
                <label for="email">E-Mail</label>
                <input type="email" id="email" name="email" placeholder="deine@email.ch" required />
              </div>
            </div>

            <div class="form-group">
              <label for="betreff">Betreff</label>
              <input type="text" id="betreff" name="betreff" placeholder="Betreff deiner Nachricht" required />
            </div>

            <div class="form-group">
              <label for="nachricht">Nachricht</label>
              <textarea id="nachricht" name="nachricht" placeholder="Schreib mir deine Nachricht..." required></textarea>
            </div>

            <button type="submit" class="btn btn-primary">Nachricht senden →</button>
          </form>
        </div>

      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>© 2025 Lian Walser · <a href="kontakt.html">Kontakt</a> · <a href="impressum.html">Impressum</a></p>
  </footer>

  <script>
    const toggle = document.querySelector('.nav-toggle');
    const links  = document.querySelector('.nav-links');
    toggle.addEventListener('click', () => {
      const open = links.classList.toggle('open');
      toggle.classList.toggle('open', open);
      toggle.setAttribute('aria-expanded', open);
    });

    // Formular Feedback
    const form = document.querySelector('form');
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      alert('Danke für deine Nachricht! Ich melde mich bald.');
      form.reset();
    });
  </script>

</body>
</html>
